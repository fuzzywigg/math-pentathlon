name: Deploy
on:
  push:
    branches: [alpha]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          api_base="https://api.cloudflare.com/client/v4"
          project_url="${api_base}/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/math-pentathlon"
          project_response="$(
            curl --silent --show-error \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              "${project_url}"
          )"

          if [ "$(echo "${project_response}" | jq -r '.success')" = "true" ]; then
            echo "Cloudflare Pages project math-pentathlon already exists"
            exit 0
          fi

          create_response="$(
            curl --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"name":"math-pentathlon","production_branch":"alpha","deployment_configs":{"production":{"compatibility_date":"2026-05-06","compatibility_flags":[]},"preview":{"compatibility_date":"2026-05-06","compatibility_flags":[]}}}' \
              "${api_base}/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          )"

          echo "${create_response}" | jq '{success, errors, project: {name: .result.name, subdomain: .result.subdomain, production_branch: .result.production_branch}}'

          if [ "$(echo "${create_response}" | jq -r '.success')" != "true" ]; then
            exit 1
          fi
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=math-pentathlon --branch=alpha
      - name: Ensure custom domain DNS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: eee4dd09cd304e2acef7ffdc087881f2
        shell: bash
        run: |
          set -euo pipefail

          api_base="https://api.cloudflare.com/client/v4"
          dns_records_url="${api_base}/zones/${CLOUDFLARE_ZONE_ID}/dns_records"
          record_response="$(
            curl --silent --show-error \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              "${dns_records_url}?type=CNAME&name=math.pappas.work"
          )"

          if [ "$(echo "${record_response}" | jq -r '.success')" != "true" ]; then
            echo "::warning::Cloudflare token cannot read DNS records for pappas.work. Add CNAME math.pappas.work -> math-pentathlon.pages.dev manually or grant DNS edit scope."
            echo "${record_response}" | jq '{success, errors}'
            exit 0
          fi

          record_id="$(echo "${record_response}" | jq -r '.result[0].id // empty')"

          payload='{"type":"CNAME","name":"math.pappas.work","content":"math-pentathlon.pages.dev","proxied":true,"ttl":1}'

          if [ -z "${record_id}" ]; then
            dns_write_response="$(
              curl --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "${payload}" \
              "${dns_records_url}"
            )"
          else
            dns_write_response="$(
              curl --silent --show-error \
              --request PATCH \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "${payload}" \
              "${dns_records_url}/${record_id}"
            )"
          fi

          echo "${dns_write_response}" | jq '{success, errors, record: {type: .result.type, name: .result.name, content: .result.content, proxied: .result.proxied}}'

          if [ "$(echo "${dns_write_response}" | jq -r '.success')" != "true" ]; then
            echo "::warning::Cloudflare token could not create or update the math.pappas.work CNAME. Add CNAME math.pappas.work -> math-pentathlon.pages.dev manually or grant DNS edit scope."
          fi
      - name: Attach custom domain
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          domains_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/math-pentathlon/domains"
          existing_domain="$(
            curl --fail --silent --show-error \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              "${domains_url}" |
            jq -r '.result[]?.name' |
            grep -Fx 'math.pappas.work' || true
          )"

          if [ "${existing_domain}" = "math.pappas.work" ]; then
            echo "math.pappas.work is already attached"
            exit 0
          fi

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"name":"math.pappas.work"}' \
            "${domains_url}" |
          jq '{success, errors, domain: .result.name, status: .result.status}'
