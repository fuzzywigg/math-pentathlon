<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Chess King Piece -->
  <!-- Cross on top -->
  <rect x="46" y="5" width="8" height="16" fill="#1a1a2e" rx="1"/>
  <rect x="41" y="9" width="18" height="6" fill="#1a1a2e" rx="1"/>

  <!-- Crown/Head -->
  <ellipse cx="50" cy="28" rx="14" ry="8" fill="#1a1a2e"/>

  <!-- Neck -->
  <rect x="42" y="32" width="16" height="8" fill="#1a1a2e"/>

  <!-- Upper body collar -->
  <ellipse cx="50" cy="42" rx="18" ry="6" fill="#1a1a2e"/>

  <!-- Body -->
  <path d="M30 48 Q28 70 26 85 L74 85 Q72 70 70 48 Z" fill="#1a1a2e"/>

  <!-- Body ring detail -->
  <ellipse cx="50" cy="55" rx="20" ry="5" fill="none" stroke="#3a3a5e" stroke-width="2"/>
  <ellipse cx="50" cy="70" rx="22" ry="5" fill="none" stroke="#3a3a5e" stroke-width="2"/>

  <!-- Base -->
  <ellipse cx="50" cy="85" rx="26" ry="6" fill="#1a1a2e"/>
  <rect x="24" y="85" width="52" height="6" fill="#1a1a2e"/>
  <ellipse cx="50" cy="91" rx="26" ry="6" fill="#1a1a2e"/>

  <!-- Highlight accents -->
  <ellipse cx="45" cy="26" rx="3" ry="2" fill="#4a4a6e" opacity="0.5"/>
